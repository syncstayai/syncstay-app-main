<!DOCTYPE html>
<html lang="fr">

<head>
    <title>Rimass Alcham • Menu Premium</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --surface-light: #1a1a1a;
            --surface-lighter: #242424;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-tertiary: #6a6a6a;
            --accent-gold: #FFD700;
            --accent-emerald: #10B981;
            --accent-blue: #3B82F6;
            --accent-red: #EF4444;
            --accent-yellow: #F59E0B;
            --glass-bg: rgba(18, 18, 18, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-weight: 900;
            font-size: 20px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #e31837, var(--accent-gold));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .top-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .table-pill {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: var(--accent-gold);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .waiter-btn,
        .cart-btn {
            background: transparent;
            border: 1px solid var(--accent-emerald);
            color: var(--accent-emerald);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .cart-btn {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .waiter-btn:active,
        .cart-btn:active {
            transform: scale(0.95);
        }

        .waiter-btn.pulsing {
            animation: pulse-green 2s infinite;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .cart-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--accent-gold);
            color: #000;
            width: 20px;
            height: 20px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 800;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .cart-badge.show {
            display: flex;
        }

        .category-bar {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 20px;
            z-index: 999;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid var(--glass-border);
            /* Fixes the Android click bug by enabling smooth momentum scrolling */
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .category-bar::-webkit-scrollbar {
            display: none;
        }

        .category-pills {
            display: inline-flex;
            gap: 8px;
        }

        .category-pill {
            background: var(--surface-light);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category-pill.active {
            background: var(--accent-gold);
            color: #000;
            border-color: var(--accent-gold);
            font-weight: 700;
        }

        .product-grid {
            padding: 140px 20px 100px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .product-card {
            background: var(--surface);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--glass-border);
            transition: transform 0.3s, border-color 0.3s;
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: linear-gradient(to bottom, transparent 40%, rgba(0, 0, 0, 0.8) 100%);
        }

        .product-info {
            padding: 20px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .product-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .product-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .product-price {
            font-size: 22px;
            font-weight: 800;
            color: var(--accent-gold);
        }

        .add-button {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: var(--accent-gold);
            border: none;
            color: #000;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .add-button:active {
            transform: scale(0.9);
        }

        .sheet-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1099;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .sheet-backdrop.active {
            opacity: 1;
            visibility: visible;
        }

        .bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: var(--surface);
            border-radius: 28px 28px 0 0;
            z-index: 1100;
            padding: 24px 20px 40px;
            transition: bottom 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 -20px 60px rgba(0, 0, 0, 0.5);
            max-height: 90vh;
            overflow-y: auto;
        }

        .bottom-sheet.active {
            bottom: 0;
        }

        .sheet-header {
            position: relative;
            padding-bottom: 12px;
            margin-bottom: 12px;
        }

        .sheet-close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            background: var(--surface-lighter);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
        }

        .sheet-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .dynamic-island {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 50px;
            padding: 12px 24px;
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 999;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            min-width: 200px;
            justify-content: center;
            cursor: pointer;
        }

        .dynamic-island.active {
            display: flex;
            animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), glow-pulse 2s infinite;
        }

        .option-section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-tertiary);
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .option-item {
            padding: 16px;
            background: var(--surface-light);
            border-radius: 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .option-item.selected {
            background: rgba(255, 215, 0, 0.1);
            border-color: var(--accent-gold);
        }

        .option-name {
            font-weight: 600;
            font-size: 15px;
        }

        .option-checkbox {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid var(--text-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option-checkbox.radio {
            border-radius: 50%;
        }

        .option-checkbox.selected {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
        }

        .option-checkbox.selected::after {
            content: '✓';
            color: #000;
            font-weight: 900;
            font-size: 12px;
        }

        .option-checkbox.radio.selected::after {
            content: '';
            width: 8px;
            height: 8px;
            background: #000;
            border-radius: 50%;
        }

        .cart-item {
            padding: 16px;
            background: var(--surface-light);
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-item-info h4 {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .cart-item-mods {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .cart-item-price {
            font-weight: 700;
            color: var(--accent-gold);
            font-size: 16px;
        }

        .cart-remove {
            color: var(--danger);
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-top: 1px solid var(--glass-border);
            margin-top: 20px;
        }

        .cart-total-text {
            font-size: 18px;
            font-weight: 700;
        }

        .cart-total-amount {
            font-size: 28px;
            font-weight: 900;
            color: var(--accent-gold);
        }

        .confirm-button {
            width: 100%;
            padding: 20px;
            background: var(--accent-gold);
            border: none;
            border-radius: 20px;
            color: #000;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        .confirm-button:active {
            transform: scale(0.98);
        }

        .toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--surface);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 24px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 14px;
            z-index: 1200;
            opacity: 0;
            transition: all 0.3s;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }

            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        @keyframes glow-pulse {

            0%,
            100% {
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 0 rgba(255, 215, 0, 0);
            }

            50% {
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 215, 0, 0.4);
            }
        }

        @media (min-width: 600px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <div class="logo">Rimass Alcham</div>
        <div class="top-right">
            <div class="table-pill" id="tablePill">
                <i class="fas fa-chair"></i>
                Table <span id="currentTable">1</span>
            </div>
            <button class="cart-btn" id="cartBtn" onclick="openCart()">
                <i class="fas fa-shopping-bag"></i>
                <div class="cart-badge" id="cartBadge">0</div>
            </button>
            <button class="waiter-btn" id="waiterBtn" onclick="callWaiter()"><i class="fas fa-bell"></i></button>
        </div>
    </div>

    <div class="category-bar">
        <div class="category-pills">
            <div class="category-pill active" onclick="filterMenu('all', this)">🔥 Tous</div>
            <div class="category-pill" onclick="filterMenu('desserts', this)">🍰 Desserts</div>
            <div class="category-pill" onclick="filterMenu('sandwiches', this)">🌯 Sandwiches</div>
            <div class="category-pill" onclick="filterMenu('plats', this)">🍽️ Plats & Grillades</div>
            <div class="category-pill" onclick="filterMenu('jus', this)">🍹 Jus Frais</div>
        </div>
    </div>

    <div class="product-grid" id="productGrid"></div>

    <div class="dynamic-island" id="dynamicIsland">
        <div class="tracker-icon"><i class="fas fa-check" style="color:var(--accent-emerald)"></i></div>
        <div class="tracker-status" style="font-weight:700">Commande envoyée</div>
    </div>

    <div class="sheet-backdrop" id="sheetBackdrop" onclick="closeAllSheets()"></div>

    <div class="bottom-sheet" id="optionsSheet">
        <button class="sheet-close-btn" onclick="closeSheet('optionsSheet')"><i class="fas fa-times"></i></button>
        <div class="sheet-header">
            <h2 class="sheet-title" id="optionsTitle">Personnaliser</h2>
        </div>
        <div id="optionsList"></div>
        <div class="cart-total" style="margin-top: 30px; padding-top: 30px;">
            <div class="cart-total-text">Total</div>
            <div class="cart-total-amount" id="livePrice">0 MAD</div>
        </div>
        <div style="display:flex; gap:12px; margin-top:20px;">
            <button class="action-button close-button"
                style="padding:16px; border-radius:16px; border:1px solid var(--glass-border); background:var(--surface-light); color:#fff; flex:1"
                onclick="closeSheet('optionsSheet')">Annuler</button>
            <button class="action-button"
                style="padding:16px; border-radius:16px; background:var(--accent-gold); color:#000; font-weight:700; border:none; flex:1"
                onclick="addToCart(false)">Ajouter au panier</button>
        </div>
    </div>

    <div class="bottom-sheet" id="cartSheet">
        <button class="sheet-close-btn" onclick="closeSheet('cartSheet')"><i class="fas fa-times"></i></button>
        <div class="sheet-header">
            <h2 class="sheet-title">Votre Panier</h2>
        </div>
        <div id="cartList"></div>
        <div class="cart-total">
            <div class="cart-total-text">Total</div>
            <div class="cart-total-amount" id="cartTotal">0 MAD</div>
        </div>
        <button class="confirm-button" onclick="openNotesSheet()">
            Continuer (<span id="cartCount">0</span> articles) <i class="fas fa-arrow-right"
                style="margin-left:8px;"></i>
        </button>
    </div>

    <div class="bottom-sheet" id="notesSheet">
        <button class="sheet-close-btn" onclick="closeSheet('notesSheet')"><i class="fas fa-times"></i></button>
        <div class="sheet-header">
            <h2 class="sheet-title">Notes & Allergies</h2>
        </div>

        <div style="margin-bottom: 24px;">
            <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 12px;">Avez-vous des allergies ou
                des instructions spéciales pour la cuisine ? (Optionnel)</p>
            <textarea id="orderNotes" placeholder="Ex: Sans oignons, allergie aux arachides, etc..."
                style="width: 100%; height: 120px; background: var(--surface-light); border: 1px solid var(--glass-border); border-radius: 16px; padding: 16px; color: var(--text-primary); font-family: inherit; font-size: 15px; resize: none; outline: none; transition: border-color 0.2s;"
                onfocus="this.style.borderColor='var(--accent-gold)'"
                onblur="this.style.borderColor='var(--glass-border)'"></textarea>
        </div>

        <button class="confirm-button" onclick="sendBatchOrder()">
            <i class="fab fa-whatsapp"></i> Commander via WhatsApp
        </button>
    </div>

    <div class="toast" id="toast"></div>

    <div class="bottom-sheet" id="tableSheet">
        <button class="sheet-close-btn" onclick="closeSheet('tableSheet')"><i class="fas fa-times"></i></button>
        <div class="sheet-header">
            <h2 class="sheet-title">Choisissez votre table</h2>
        </div>
        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:20px;">
            <script>
                for (let i = 1; i <= 15; i++) {
                    document.write(`<div style="background:var(--surface-light); padding:20px; border-radius:16px; text-align:center; font-weight:700; cursor:pointer; border:2px solid transparent; transition:all 0.2s;" onclick="setTable(${i})" onmouseover="this.style.borderColor='var(--accent-gold)'" onmouseout="this.style.borderColor='transparent'">${i}</div>`);
                }
            </script>
        </div>
    </div>

        let socket;
        function connectSocket() {
            try {
                socket = io({ reconnection: true, timeout: 20000 });
            } catch (e) {
                console.log("Socket connection failed:", e);
            }
        }
        connectSocket();

        let cart = [], activeOrders = [], currentKey = "", basePrice = 0, extraPrices = 0;
        let selectedMods = {}; // Store the user's choices
        let tableNum = localStorage.getItem('staySync_table') || "1";

        window.onload = function () {
            document.getElementById("currentTable").innerText = tableNum;
            renderMenu('all');
            updateCartUI();
        };

        document.getElementById('tablePill').addEventListener('click', () => { openSheet('tableSheet'); });

        function setTable(n) {
            tableNum = n;
            document.getElementById("currentTable").innerText = n;
            localStorage.setItem('staySync_table', n);
            closeSheet('tableSheet');
            showToast(`Table ${n} sélectionnée`);
        }

        function filterMenu(cat, btn) {
            document.querySelectorAll('.category-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Fixes Android tap issues by safely scrolling the button into view
            btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

            renderMenu(cat);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderMenu(cat) {
            const grid = document.getElementById("productGrid");
            if (!grid) return;
            grid.innerHTML = "";
            for (let key in products) {
                let p = products[key];
                if (cat !== 'all' && p.cat !== cat) continue;
                grid.innerHTML += `
                    <div class="product-card" onclick="openProduct('${key}')">
                        <img src="${p.img}" alt="${p.name}" class="product-image">
                        <div class="image-overlay"></div>
                        <div class="product-info">
                            <h3 class="product-title">${p.name}</h3>
                            <p class="product-desc">${p.desc}</p>
                            <div class="product-footer">
                                <div class="product-price">${p.price.toFixed(2)} MAD</div>
                                <button class="add-button" onclick="event.stopPropagation(); openProduct('${key}')">+</button>
                            </div>
                        </div>
                    </div>`;
            }
        }

        function openProduct(key) {
            currentKey = key; extraPrices = 0; selectedMods = {};
            const p = products[key]; basePrice = p.price;
            document.getElementById("optionsTitle").innerText = p.name;

            let html = "";
            if (p.options && p.options.requiredChoices) {
                p.options.requiredChoices.forEach(choice => {
                    html += `<div class="option-section"><div class="section-title">${choice.title}</div>`;
                    choice.selections.forEach((sel, index) => {
                        const isSelected = (index === 0);
                        if (isSelected) selectedMods[choice.title] = sel;

                        let priceTag = sel.price > 0 ? `<div class="option-price" style="color: var(--accent-emerald); font-weight: 700;">+${sel.price.toFixed(2)} MAD</div>` : "";

                        html += `<div class="option-item ${isSelected ? 'selected' : ''}" onclick="selectRequiredOption(this, '${choice.title}', '${sel.name}', ${sel.price})">
                            <div class="option-name">${sel.name}</div>
                            <div style="display:flex; align-items:center; gap:12px;">
                                ${priceTag}
                                <div class="option-checkbox radio ${isSelected ? 'selected' : ''}"></div>
                            </div>
                        </div>`;
                    });
                    html += `</div>`;
                });
            }

            document.getElementById("optionsList").innerHTML = html || "<p style='text-align:center;color:var(--text-tertiary);margin-top:20px'>Aucune option disponible</p>";
            updatePrice(); openSheet("optionsSheet");
        }

        function selectRequiredOption(element, choiceTitle, selName, selPrice) {
            const container = element.parentElement;
            container.querySelectorAll('.option-item').forEach(i => i.classList.remove('selected'));
            container.querySelectorAll('.option-checkbox').forEach(i => i.classList.remove('selected'));

            element.classList.add('selected');
            element.querySelector('.option-checkbox').classList.add('selected');

            selectedMods[choiceTitle] = { name: selName, price: selPrice };
            updatePrice();
        }

        function updatePrice() {
            let extra = 0;
            for (let title in selectedMods) { extra += selectedMods[title].price; }
            extraPrices = extra;
            document.getElementById("livePrice").innerText = (basePrice + extraPrices).toFixed(2) + " MAD";
        }

        function addToCart(instant = false) {
            const p = products[currentKey];
            let modsList = [];
            let mainPrice = basePrice;
            let addFritesAsSeparateItem = false;

            for (let title in selectedMods) {
                const mod = selectedMods[title];

                if (mod.name.includes("Frites") && mod.price > 0) {
                    addFritesAsSeparateItem = true;
                }
                else if (mod.name !== "Sans frites") {
                    modsList.push(mod.name);
                    mainPrice += mod.price;
                }
            }

            cart.push({ name: p.name, price: mainPrice, qty: 1, mods: modsList });

            if (addFritesAsSeparateItem) {
                cart.push({ name: "Frite", price: 8.00, qty: 1, mods: [] });
            }

            updateCartUI();
            showToast("Ajouté au panier !");
            closeSheet("optionsSheet");
        }

        function updateCartUI() {
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById("cartCount").innerText = cart.length;
            document.getElementById("cartTotal").innerText = total.toFixed(2) + " MAD";
            const badge = document.getElementById("cartBadge");
            badge.innerText = cart.length;
            cart.length > 0 ? badge.classList.add("show") : badge.classList.remove("show");

            let html = "";
            cart.forEach((item, i) => {
                const mods = item.mods.length > 0 ? `<div class="cart-item-mods">${item.mods.join(", ")}</div>` : '';
                html += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>${mods}
                            <div class="cart-item-price">${item.price.toFixed(2)} MAD</div>
                        </div>
                        <button class="cart-remove" onclick="removeFromCart(${i})"><i class="fas fa-trash"></i></button>
                    </div>`;
            });
            document.getElementById("cartList").innerHTML = html || '<div style="text-align:center;padding:40px;color:var(--text-tertiary)">Votre panier est vide</div>';
        }

        function removeFromCart(index) { cart.splice(index, 1); updateCartUI(); }
        function openCart() { updateCartUI(); openSheet("cartSheet"); }

        function openNotesSheet() {
            if (cart.length === 0) { showToast("Le panier est vide !"); return; }
            closeSheet('cartSheet'); openSheet('notesSheet');
        }

        const restaurantPhone = "212605080812";
        function sendBatchOrder() {
            if (cart.length === 0) { showToast("Le panier est vide !"); return; }

            const notesInput = document.getElementById('orderNotes').value.trim();
            const orderObj = { orderId: Date.now(), table: tableNum, items: JSON.parse(JSON.stringify(cart)), notes: notesInput };
            if (socket && socket.connected) { socket.emit('new_order', orderObj); }

            // Using \n for newlines so we can safely encode the entire string at the end
            let message = `*Nouvelle Commande - Table ${tableNum}* 🍽️\n------------------------\n`;
            let total = 0;
            cart.forEach(item => {
                message += `▪ 1x ${item.name} (${item.price} MAD)\n`;
                if (item.mods && item.mods.length > 0) message += `   _Note: ${item.mods.join(", ")}_\n`;
                total += item.price;
            });
            message += `------------------------\n*Total: ${total} MAD*\n`;

            if (notesInput) {
                message += `\n*Notes / Allergies:*\n_${notesInput}_\n`;
            }

            message += `\n_Merci de confirmer la préparation._`;

            cart = [];
            document.getElementById('orderNotes').value = "";
            updateCartUI();
            closeSheet("notesSheet");

            const island = document.getElementById("dynamicIsland");
            island.classList.add("active");
            setTimeout(() => island.classList.remove("active"), 5000);

            // MAGIC FIX: encodeURIComponent makes the whole string safe for all Androids and iPhones
            window.open(`https://wa.me/${restaurantPhone}?text=${encodeURIComponent(message)}`, '_blank');
        }

        function callWaiter() { showToast("🔔 Serveur appelé - Table " + tableNum); }

        function openSheet(id) {
            document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add("active");
            document.getElementById('sheetBackdrop').classList.add('active');
        }
        function closeSheet(id) {
            document.getElementById(id).classList.remove("active");
            document.getElementById('sheetBackdrop').classList.remove('active');
        }
        function closeAllSheets() {
            document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active'));
            document.getElementById('sheetBackdrop').classList.remove('active');
        }
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message; toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 3000);
        }
    </script>
